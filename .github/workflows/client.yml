name: Client Workflow
on:
  push:
    branches: [dev]
    paths:
      - 'client/**'
jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
