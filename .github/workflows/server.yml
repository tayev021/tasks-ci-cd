name: Server Workflow
on:
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Dependencies
        run: npm ci
      - name: Format
        run: npm run format
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
