name: tasks-app
services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
  server:
    container_name: server
    depends_on:
      - mysql
    build:
      context: ./server
      target: development
    ports:
      - '${SERVER_PORT}:${SERVER_PORT}'
    volumes:
      - './server:/app'
      - '/app/node_modules'
    environment:
      CHOKIDAR_USEPOLLING: true
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: ${SERVER_PORT}
  client:
    container_name: client
    depends_on:
      - server
    build:
      context: ./client
      target: development
    ports:
      - '${CLIENT_PORT}:${CLIENT_PORT}'
    volumes:
      - './client:/app'
      - '/app/node_modules'
    environment:
      CHOKIDAR_USEPOLLING: true
      VITE_API_URL: ${VITE_API_URL}
      PORT: ${CLIENT_PORT}

volumes:
  mysql_data:
